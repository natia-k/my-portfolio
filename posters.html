<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSTERS | NATIA STUDIO</title>
    <style>
        :root {
            --bg: #050505;
            --bone: #e8e8e3;
            --bone-dim: rgba(232, 232, 227, 0.4);
            --line: rgba(232, 232, 227, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--bg);
            color: var(--bone);
            font-family: "Helvetica Neue", "Helvetica", Arial, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ATMOSPHERIC REVEAL EFFECT */
        @keyframes revealBlur {
            0% { filter: blur(30px); opacity: 0; transform: translateY(20px); letter-spacing: 0.1em; }
            100% { filter: blur(0px); opacity: 1; transform: translateY(0); letter-spacing: -0.05em; }
        }

        nav { position: fixed; top: 40px; left: 6%; z-index: 1000; }
        nav a { 
            color: var(--bone); text-decoration: none; font-size: 10px; 
            font-weight: 900; letter-spacing: 5px; text-transform: uppercase; 
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 0 10%;
        }

        .hero h1 { 
            font-size: 11px; letter-spacing: 1.5em; text-transform: uppercase; 
            margin-bottom: 40px; font-weight: 400; opacity: 0.2;
        }

        .hero .main-statement { 
            max-width: 1100px; font-size: 90px; line-height: 0.85; 
            font-weight: 900; text-transform: uppercase; 
            margin-bottom: 10px; text-align: left;
            animation: revealBlur 1.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .hero .sub-statement { 
            font-size: 28px; font-weight: 700; line-height: 1.2;
            letter-spacing: -0.02em; text-transform: uppercase;
            animation: revealBlur 2s cubic-bezier(0.19, 1, 0.22, 1) 0.3s forwards;
            opacity: 0;
        }

        .hero .sub-statement.last { 
            font-weight: 400; margin-bottom: 40px;
            animation: revealBlur 2.2s cubic-bezier(0.19, 1, 0.22, 1) 0.6s forwards;
            opacity: 0;
        }

        /* ENHANCED VISIBILITY FOR PRINT NOTICE */
        .hero .buy-prints {
            font-size: 16px;
            font-style: italic; font-weight: 400;
            color: var(--bone);
            letter-spacing: 0.02em;
            max-width: 600px; line-height: 1.6;
            animation: revealBlur 2.5s cubic-bezier(0.19, 1, 0.22, 1) 1s forwards;
            opacity: 0;
            border-left: 1px solid var(--line);
            padding-left: 20px;
        }

        /* CONTENT SECTIONS */
        .stack-container { width: 100%; }
        .poster-section {
            position: sticky; top: 0; height: 100vh; width: 100%;
            display: flex; align-items: center; justify-content: flex-start;
            background: var(--bg); padding-left: 10%;
        }

        .exhibition-container {
            display: flex; align-items: flex-start; gap: 80px; width: 100%;
        }

        .poster-frame { width: 45vw; height: 75vh; position: relative; flex-shrink: 0; }
        .poster-frame img { 
            max-width: 100%; max-height: 100%; object-fit: contain; 
            box-shadow: 0 40px 120px rgba(0,0,0,0.9);
        }

        .exhibition-text { max-width: 420px; text-align: left; margin-top: 20px; }
        .ex-title { font-size: 32px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.03em; margin-bottom: 5px; }
        .ex-subtitle { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.4em; margin-bottom: 30px; color: var(--bone-dim); }
        
        .ex-body { 
            font-size: 15px; line-height: 1.8; font-weight: 400; 
            color: var(--bone-dim); max-height: 50vh; overflow-y: auto; padding-right: 20px;
        }
        .ex-body::-webkit-scrollbar { width: 1px; }
        .ex-body::-webkit-scrollbar-thumb { background: var(--line); }
        .ex-body p { margin-bottom: 25px; white-space: pre-line; }

        .meta { 
            position: absolute; bottom: -40px; left: 0; 
            font-size: 9px; letter-spacing: 0.5em; opacity: 0.3; 
            font-weight: 700; text-transform: uppercase;
        }

        .footer-nav {
            position: relative; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            padding: 100px 10% 100px; border-top: 1px solid var(--line); background: var(--bg);
        }
        .footer-nav a { font-size: 10px; font-weight: 900; letter-spacing: 5px; text-decoration: none; color: var(--bone); opacity: 0.4; transition: 0.4s; }
        .footer-nav a:hover { opacity: 1; }

        @media (max-width: 1100px) {
            .hero .main-statement { font-size: 44px; }
            .poster-section { height: auto; position: relative; padding: 100px 6%; }
            .exhibition-container { flex-direction: column; gap: 40px; }
            .poster-frame { width: 100%; height: 50vh; }
        }
    </style>
</head>
<body>

    <nav><a href="index.html">NATIA STUDIO</a></nav>

    <header class="hero">
        <h1>POSTERS / ARCHIVE</h1>
        <div class="main-statement">Solar.</div>
        <div class="sub-statement">They loved.</div>
        <div class="sub-statement last">They could not stay.</div>
        <div class="buy-prints">
            *Some works in this series were created for exhibition settings and are available as limited art prints upon request.
        </div>
    </header>

    <div class="stack-container">
        <section class="poster-section">
            <div class="exhibition-container">
                <div class="poster-frame">
                    <img data-src="sun.jpg" class="deep-fix" alt="Solar">
                    <div class="meta">REF / 008</div>
                </div>
                <div class="exhibition-text">
                    <h2 class="ex-title">Solar</h2>
                    <p class="ex-subtitle">Digital Illustration / 2023</p>
                    <div class="ex-body">
                        <p>They loved. They could not stay.</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer-nav">
        <a href="flashbacks.html">← PREV</a>
        <a href="index.html">MAIN</a>
        <a href="nostalgia.html">NEXT →</a>
    </footer>

    <script>
        // FORCED SCAN FOR GITHUB FILENAMES
        document.querySelectorAll('.deep-fix').forEach(img => {
            const raw = img.getAttribute('data-src');
            if(!raw) return;
            const base = raw.split('.')[0];
            const variants = [
                raw, 
                base.toLowerCase() + ".jpg", 
                base.toUpperCase() + ".jpg", 
                base.charAt(0).toUpperCase() + base.slice(1) + ".jpg",
                base + ".png", base + ".JPG", base + ".webp", base.toLowerCase() + ".png"
            ];
            let i = 0;
            const tryLoad = () => {
                if (i < variants.length) {
                    img.src = variants[i];
                    i++;
                }
            };
            img.onerror = tryLoad;
            tryLoad();
        });

        // Sticky Scale Animation
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.poster-section').forEach(section => {
                const rect = section.getBoundingClientRect();
                const frame = section.querySelector('.poster-frame');
                if (frame && rect.top <= 0) {
                    const progress = Math.abs(rect.top) / window.innerHeight;
                    frame.style.opacity = 1 - (progress * 1.5);
                    frame.style.transform = `scale(${1 - (progress * 0.1)})`;
                }
            });
        });
    </script>
</body>
</html>
